<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Proxymancer</title>
    <style>
      body {
        font: 13px system-ui, sans-serif;
        width: 268px;
        margin: 0;
        padding: 12px;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 4px;
      }
      .header h1 {
        font-size: 14px;
        margin: 0;
      }
      label {
        display: block;
        margin: 8px 0 2px;
        font-weight: 600;
      }
      input,
      select,
      textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 4px 6px;
        font: inherit;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: flex-end;
      }
      textarea {
        resize: vertical;
        min-height: 56px;
      }

      /* Toggle switch */
      .switch {
        position: relative;
        display: inline-block;
        width: 42px;
        height: 24px;
        margin: 0;
        flex: none;
      }
      .switch input {
        position: absolute;
        width: 0;
        height: 0;
        opacity: 0;
      }
      .slider {
        position: absolute;
        inset: 0;
        background: #c4c4c4;
        border-radius: 24px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .slider::before {
        content: "";
        position: absolute;
        width: 18px;
        height: 18px;
        left: 3px;
        top: 3px;
        background: #fff;
        border-radius: 50%;
        transition: transform 0.15s;
      }
      .switch input:checked + .slider {
        background: #2a8f5e;
      }
      .switch input:checked + .slider::before {
        transform: translateX(18px);
      }
      .switch input:focus-visible + .slider {
        outline: 2px solid #2a8f5e;
        outline-offset: 2px;
      }

      /* Live state line */
      #state {
        margin: 0 0 12px;
        font-size: 12px;
        font-weight: 600;
        min-height: 1em;
      }
      #state.on {
        color: #2a8f5e;
      }
      #state.off {
        color: #888;
      }

      /* Config is dimmed while the proxy is off (still editable) */
      #config {
        transition: opacity 0.15s;
      }
      body.disabled #config {
        opacity: 0.5;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0 0 0 0);
        border: 0;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Proxymancer</h1>
      <label class="switch" title="Enable proxy">
        <input type="checkbox" id="enabled" />
        <span class="slider"></span>
        <span class="sr-only">Enable proxy</span>
      </label>
    </div>

    <p id="state" class="off">Off — using system proxy</p>

    <div id="config">
      <div class="row">
        <div style="flex: 0 0 92px">
          <label for="scheme">Scheme</label>
          <select id="scheme">
            <option value="http">http</option>
            <option value="https">https</option>
            <option value="socks5">socks5</option>
            <option value="socks4">socks4</option>
          </select>
        </div>
        <div style="flex: 1">
          <label for="host">Host</label>
          <input type="text" id="host" placeholder="127.0.0.1" />
        </div>
        <div style="flex: 0 0 68px">
          <label for="port">Port</label>
          <input type="number" id="port" min="1" max="65535" placeholder="8080" />
        </div>
      </div>

      <label for="bypass">Bypass list (one per line)</label>
      <textarea id="bypass" placeholder="localhost&#10;127.0.0.1&#10;*.internal"></textarea>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
